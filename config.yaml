project:
  name: "IEEE Data Fusion Contest 2026"
  description: "Processamento de séries temporais de imagens SAR Capella Space"

paths:
  raw: "data/raw/capella"
  processed: "data/processed"
  output: "output/figures"
  csv_contest: "data/external/Capella_IEEE_DataContest_2026.csv"

image:
  sensor: "Capella"
  satelite: "C13"
  modo: "SP_GEO"
  polarizacao: "HH"
  epsg: "EPSG:4326"
  resolucao: 0.5

series_temporais:
  datas:
    - "2025-11-12"
  intervalo_aquisicao:
    inicio: "02:24:41"
    fim: "02:24:53"

processing:
  filtro_speckle:
    ativo: true
    tamanho_janela: 5
  calibracao:
    ativo: true
    tipo: "sigma0"
  threshold: 0.3

visualization:
  colormap: "gray"
  dpi: 300
  formato_saida: "png"